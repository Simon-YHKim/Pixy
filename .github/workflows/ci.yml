name: pixy-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # the floors SKILL.md promises (python>=3.9, pillow>=9.0) and the
        # daily drivers - both ends of the support window stay proven
        include:
          - python-version: "3.9"
            pillow: "Pillow==9.0.0"
          - python-version: "3.11"
            pillow: "Pillow"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Pillow
        run: python -m pip install --quiet "${{ matrix.pillow }}"
      - name: Integration tests (incl. golden fidelity)
        run: python scripts/tests/run_all.py
      - name: Validate scripts are ASCII-clean
        run: |
          if grep -rlP '[^\x00-\x7F]' scripts/ --include='*.py'; then
            echo "non-ASCII found in a .py source"; exit 1
          fi
